<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<defs>
		<linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#73bed3"/>
			<stop offset="1" stop-color="#4f8fba"/>
		</linearGradient>
	</defs>
	<rect x="2" y="2" width="60" height="60" rx="12" fill="url(#g)"/>
	<!-- camera body -->
	<rect x="13" y="21" width="38" height="26" rx="4" fill="#172038" stroke="#e7d5b3" stroke-width="1.5"/>
	<!-- viewfinder bump -->
	<rect x="36" y="13" width="11" height="8" rx="3" fill="#172038" stroke="#e7d5b3" stroke-width="1.5"/>
	<!-- lens barrel -->
	<circle cx="32" cy="34" r="9" fill="#172038" stroke="#e7d5b3" stroke-width="1.5"/>
	<!-- lens glass -->
	<circle cx="32" cy="34" r="5" fill="#a4dddb"/>
	<!-- lens highlight -->
	<circle cx="30" cy="32" r="2" fill="#ebede9"/>
	<!-- record indicator -->
	<circle cx="41.5" cy="17" r="2" fill="#cf573c"/>
</svg>
