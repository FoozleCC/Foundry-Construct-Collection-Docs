<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<defs>
		<linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#da863e"/>
			<stop offset="1" stop-color="#be772b"/>
		</linearGradient>
	</defs>
	<rect x="2" y="2" width="60" height="60" rx="12" fill="url(#g)"/>
	<!-- isometric cube, flat fills -->
	<polygon points="32,13 50,23 32,33 14,23" fill="#e8c170"/>
	<polygon points="14,23 32,33 32,51 14,41" fill="#172038"/>
	<polygon points="50,23 32,33 32,51 50,41" fill="#253a5e"/>
	<!-- cube edges, fully opaque -->
	<path fill="none" stroke="#e7d5b3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
		d="M 14,41 L 14,23 L 32,13 L 50,23 L 50,41 L 32,51 Z M 14,23 L 32,33 L 50,23 M 32,33 L 32,51"/>
